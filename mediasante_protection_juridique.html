<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:100;background:var(--topbar-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 14px;gap:10px}
.back-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);font-size:12px;cursor:pointer;font-family:var(--font-body)}
.tb-title{font-size:14px;font-weight:600;flex:1;text-align:center}
.ps-theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-2);background:transparent;cursor:pointer;font-size:14px}
.tabs{display:flex;background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:50;overflow-x:auto}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;min-width:80px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content{padding:14px 14px 90px}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:var(--text-2);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px 11px;outline:none;font-family:var(--font-body);-webkit-appearance:none}
.field textarea{resize:vertical;min-height:60px;line-height:1.5}
.btn-primary{width:100%;padding:12px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body)}
.btn-secondary{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);font-size:13px;cursor:pointer;font-family:var(--font-body);margin-top:6px}
.btn-amber{width:100%;padding:10px;border-radius:10px;background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:6px}
.btn-purple{width:100%;padding:10px;border-radius:10px;background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid}
.pill.blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.pill.green{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.pill.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.pill.red{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.pill.purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.mesure-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.mesure-card:hover{border-color:var(--border-2)}
.mesure-card.selected{border-color:var(--blue-border);background:var(--blue-bg)}
.mesure-name{font-size:14px;font-weight:700;margin-bottom:4px}
.mesure-desc{font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:8px}
.mesure-tags{display:flex;flex-wrap:wrap;gap:4px}
.criteria-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg-3);border-radius:8px;margin-bottom:6px}
.criteria-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.criteria-check.checked{background:var(--blue);border-color:var(--blue);color:#fff}
.criteria-text{font-size:12px;flex:1;line-height:1.5}
.criteria-weight{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.contact-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.contact-name{font-size:13px;font-weight:700;margin-bottom:2px}
.contact-role{font-size:11px;color:var(--text-2);margin-bottom:6px}
.contact-actions{display:flex;gap:6px}
.c-btn{flex:1;padding:7px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-2);font-family:var(--font-body);text-align:center}
.c-btn.call{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.suivi-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.suivi-date{font-size:11px;color:var(--text-3);width:80px;flex-shrink:0}
.result-box{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;margin-top:10px}
.ai-loading{color:var(--text-3);font-size:12px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--border-2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:12px;z-index:999;white-space:nowrap;pointer-events:none}
.score-bar{height:8px;background:var(--bg-4);border-radius:4px;margin-top:6px}
.score-fill{height:100%;border-radius:4px;transition:width .5s}
</style>
</head>
<body>

  },

    cost:"Selon ressources",

  {

    color:"var(--red)",
    desc:"Mesure la plus protectrice. Le tuteur accomplit tous les actes a la place de la personne. Reservee aux situations les plus severes.",
    criteres_min:["c1","c2","c10"],
    avantages:["Protection maximale","Tous les actes couverts"],
    limites:["Perte quasi-totale de l autonomie juridique","Procedure longue","Bilan annuel obligatoire"],

    cerfa:"CERFA 15891 (simplifie)"
  },
];

var CONTACTS_PJ = [
  {nom:"Service Tutelles UDAF 93", role:"Mandataire judiciaire — tutelle et curatelle", tel:"01 48 95 XX XX", adresse:"15 rue Marceau, 93000 Bobigny", info:"Prendre RDV apres decision du juge. Bilan patrimonial annuel."},
  {nom:"ATMP 93 — Association Tutelaire", role:"Mandataire judiciaire — toutes mesures", tel:"01 48 09 XX XX", adresse:"8 bd Carnot, 93200 Saint-Denis", info:"Association habilitee pour tutelle, curatelle, sauvegarde."},
  {nom:"Tribunal Judiciaire de Bobigny — greffe tutelles", role:"Depot des requetes en protection", tel:"01 41 83 XX XX", adresse:"173 av. Paul Vaillant-Couturier, 93000 Bobigny", info:"Depot requete CERFA 15891 avec certificat medical. Horaires : Lun-Ven 8h30-12h."},

  {nom:"France Services Epinay", role:"Aide constitution dossier", tel:"01 48 26 XX XX", adresse:"2 pl. de la Republique, 93800 Epinay", info:"Accompagnement gratuit pour remplir les CERFA et constituer le dossier."},
];

// ── SUIVI MESURES ──
var pjSuivis = JSON.parse(localStorage.getItem("ps_pj_suivis")||"[]");

// ── INIT ──
window.addEventListener("load", function(){render();});

function switchTab(tab){
  currentTab = tab;
  ["eval","mesures","dossier","contacts","suivi"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("active", t===tab);
  });
  render();
}

function render(){
  if(currentTab==="eval") renderEval();
  else if(currentTab==="mesures") renderMesures();
  else if(currentTab==="dossier") renderDossier();
  else if(currentTab==="contacts") renderContacts();
  else if(currentTab==="suivi") renderSuivi();
}

// ── ÉVALUATION ──
function renderEval(){
  var el = document.getElementById("mainContent");
  el.innerHTML = "";

  var introCard = document.createElement("div");
  introCard.className = "card";
  introCard.innerHTML = "<div class='card-title'>&#128269; Evaluation de la situation</div>"+
    "<div style='font-size:12px;color:var(--text-2);line-height:1.6;margin-bottom:10px'>Cochez les situations qui correspondent au patient. L outil calcule le niveau de protection recommande.</div>";

  // Grouper par domaine
  var domaines = {
    cognitif: {label:"Capacites cognitives et decisionnelles", icon:"&#129504;"},
    actes_prejudiciables: {label:"Actes prejudiciables", icon:"&#9888;"},
    finances: {label:"Gestion financiere", icon:"&#128176;"},
    autonomie: {label:"Autonomie quotidienne", icon:"&#128100;"},
    sante: {label:"Etat de sante", icon:"&#127973;"},
    entourage: {label:"Entourage et famille", icon:"&#128106;"},
    emprise: {label:"Emprise et isolement", icon:"&#128274;"},
    medical: {label:"Attestation medicale", icon:"&#128203;"},
    urgence: {label:"Urgence", icon:"&#128308;"},
  };

  Object.keys(domaines).forEach(function(dom){
    var domCriteres = CRITERES.filter(function(c){return c.domaine===dom;});
    if(!domCriteres.length) return;

    var domDiv = document.createElement("div");
    domDiv.style.marginBottom = "12px";

    var domLabel = document.createElement("div");
    domLabel.style.cssText = "font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px";
    domLabel.textContent = domaines[dom].label;
    domDiv.appendChild(domLabel);

    domCriteres.forEach(function(c){
      var item = document.createElement("div");
      item.className = "criteria-item";
      var chk = document.createElement("div");
      chk.className = "criteria-check" + (criteriaState[c.id]?" checked":"");
      chk.innerHTML = criteriaState[c.id]?"&#10003;":"";
      chk.onclick = (function(id, el){return function(){
        criteriaState[id] = !criteriaState[id];
        el.classList.toggle("checked", criteriaState[id]);
        el.innerHTML = criteriaState[id]?"&#10003;":"";
        updateScore();
      };})(c.id, chk);
      var txt = document.createElement("div");
      txt.className = "criteria-text";
      txt.textContent = c.text;
      var weight = document.createElement("span");
      weight.className = "criteria-weight pill "+(c.poids>=3?"red":c.poids>=2?"amber":"blue");
      weight.textContent = c.poids>=3?"Critique":c.poids>=2?"Important":"Utile";
      item.appendChild(chk);
      item.appendChild(txt);
      item.appendChild(weight);
      domDiv.appendChild(item);
    });
    introCard.appendChild(domDiv);
  });

  el.appendChild(introCard);

  var scoreDiv = document.createElement("div");
  scoreDiv.id = "scoreResult";
  el.appendChild(scoreDiv);
  updateScore();
}

function updateScore(){
  var score = 0;
  var maxScore = 0;
  CRITERES.forEach(function(c){
    maxScore += c.poids;
    if(criteriaState[c.id]) score += c.poids;
  });
  var pct = maxScore > 0 ? Math.round(score/maxScore*100) : 0;

  var el = document.getElementById("scoreResult");
  if(!el) return;

  if(score === 0){
    el.innerHTML = "";
    return;
  }

  var recommendation = "";
  var recColor = "var(--blue)";
  var recPill = "blue";

  // Logique de recommandation
  var c1 = criteriaState["c1"];
  var c2 = criteriaState["c2"];
  var c3 = criteriaState["c3"];
  var c10 = criteriaState["c10"];
  var c11 = criteriaState["c11"];
  var c12 = criteriaState["c12"];
  var c5 = criteriaState["c5"];

  if(c11 || (c3 && c10)){
    recommendation = "Sauvegarde de justice recommandee en urgence";
    recColor = "var(--amber)"; recPill = "amber";
  } else if(c1 && c2 && c10){
    recommendation = "Tutelle probablement necessaire — situation severe";
    recColor = "var(--red)"; recPill = "red";
  } else if(c5 && c3 && c10){
    recommendation = "Curatelle renforcee recommandee";
    recColor = "var(--purple)"; recPill = "purple";
  } else if(c12 && c10){
    recommendation = "Habilitation familiale a envisager en priorite";
    recColor = "var(--green)"; recPill = "green";
  } else if(c10 && score >= 4){
    recommendation = "Curatelle simple a explorer";
    recColor = "var(--blue)"; recPill = "blue";
  } else {
    recommendation = "Situation a surveiller — evaluer avec le medecin";
    recColor = "var(--text-2)"; recPill = "blue";
  }

  el.innerHTML = "<div class='card' style='margin-top:2px;border-color:"+recColor+";border-top:3px solid "+recColor+"'>"+
    "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'>"+
    "<div style='font-size:13px;font-weight:700'>Score de vulnerabilite</div>"+
    "<div style='font-size:20px;font-weight:700;color:"+recColor+"'>"+pct+"%</div>"+
    "</div>"+
    "<div class='score-bar'><div class='score-fill' style='width:"+pct+"%;background:"+recColor+"'></div></div>"+
    "<div style='margin-top:12px;padding:10px;background:var(--bg-3);border-radius:8px'>"+
    "<div style='font-size:12px;font-weight:700;color:"+recColor+";margin-bottom:4px'>Recommandation</div>"+
    "<div style='font-size:13px;font-weight:600'>"+recommendation+"</div>"+
    "</div>"+
    "<div style=\"display:flex;gap:8px;margin-top:10px\">"+
    "<button class=\"btn-primary\" style=\"padding:10px\" onclick=\"switchTab('mesures')\">Voir les mesures disponibles</button>"+
    "<button class=\"btn-secondary\" style=\"padding:10px;margin-top:0;width:auto;flex-shrink:0\" onclick=\"switchTab('dossier')\">Preparer le dossier</button>"+
    "</div>"+
    "</div>";
}

// ── MESURES ──
function renderMesures(){
  var el = document.getElementById("mainContent");
  el.innerHTML = "";

  MESURES.forEach(function(m){
    var card = document.createElement("div");
    card.className = "mesure-card" + (selectedMesure===m.id?" selected":"");
    card.onclick = (function(id){return function(){selectedMesure=id;renderMesures();};})(m.id);

    card.innerHTML = "<div class='mesure-name'><span>"+m.icon+"</span> "+m.nom+"</div>"+
      "<div class='mesure-desc'>"+m.desc+"</div>"+
      "<div class='mesure-tags'>"+
      "<span class='pill blue'>"+m.duree+"</span>"+
      "<span class='pill amber'>"+m.delai+"</span>"+
      "<span class='pill green'>"+m.cost+"</span>"+
      "</div>";

    if(selectedMesure === m.id){
      var detail = document.createElement("div");
      detail.style.cssText = "margin-top:12px;border-top:1px solid var(--border);padding-top:12px";
      detail.innerHTML = "<div style='font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin-bottom:6px'>Avantages</div>"+
        m.avantages.map(function(a){return "<div style='font-size:12px;color:var(--green);margin-bottom:3px'>+ "+a+"</div>";}).join("")+
        "<div style='font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin:10px 0 6px'>Limites</div>"+
        m.limites.map(function(l){return "<div style='font-size:12px;color:var(--amber);margin-bottom:3px'>- "+l+"</div>";}).join("")+
        "<div style='font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin:10px 0 6px'>Demarche</div>"+
        "<div style='font-size:12px;color:var(--text-2);line-height:1.6'>"+m.demarche+"</div>"+
        "<div style='margin-top:8px'><span class='pill purple'>"+m.cerfa+"</span></div>";

      var btns = document.createElement("div");
      btns.style.cssText = "display:flex;flex-direction:column;gap:6px;margin-top:12px";

      var btnDossier = document.createElement("button");

// ── DOSSIER ──
function renderDossier(){
  var el = document.getElementById("mainContent");

  var mesure = selectedMesure ? MESURES.find(function(m){return m.id===selectedMesure;}) : null;

  }

  // Header mesure sélectionnée
  var headerCard = document.createElement("div");
  headerCard.className = "card";
  if(mesure){
    headerCard.innerHTML = "<div class='card-title'>"+mesure.icon+" Dossier — "+mesure.nom+"</div>"+

      "<div style='display:flex;gap:6px;flex-wrap:wrap'>"+
      "<span class='pill blue'>"+mesure.duree+"</span>"+
      "<span class='pill amber'>Delai : "+mesure.delai+"</span>"+
      "</div>";
  } else {
    headerCard.innerHTML = "<div class='card-title'>&#128196; Preparer un dossier</div>"+
      "<div style='font-size:12px;color:var(--text-2)'>Selectionnez d abord une mesure dans l onglet Mesures, ou choisissez ici.</div>"+
      "<div style='display:flex;gap:6px;flex-wrap:wrap;margin-top:10px'>"+
      (function(){return MESURES.map(function(m){var sp=document.createElement("span");sp.className="pill purple";sp.style.cursor="pointer";sp.textContent=m.nom;sp.onclick=(function(id){return function(){selectedMesure=id;switchTab("dossier");};})(m.id);return sp.outerHTML;}).join("");})()
      "</div>";
  }
  el.appendChild(headerCard);

  // Checklist pièces
  var checkCard = document.createElement("div");
  checkCard.className = "card";
  checkCard.innerHTML = "<div class='card-title'>&#9989; Checklist des pieces</div>";

  var piecesCommunes = [
    {label:"Piece d identite du majeur a proteger (CNI ou passeport)"},
    {label:"Justificatif de domicile de moins de 3 mois"},
    {label:"Livret de famille"},
    {label:"Titre de pension ou avis d imposition"},
    {label:"Certificat medical etabli par un medecin inscrit sur la liste du procureur"},
    {label:"Liste du patrimoine (comptes bancaires, biens immobiliers...)"},
  ];

  var piecesSpecifiques = mesure && mesure.id === "habilitation_familiale" ? [
    {label:"Accord ecrit de tous les membres de la famille proche"},
    {label:"Piece d identite du membre de la famille demandeur"},
  ] : mesure && mesure.id === "sauvegarde" ? [
    {label:"Lettre du medecin traitant au Procureur (pas de CERFA)"},
  ] : [
    {label:"CERFA 15891 rempli et signe"},
    {label:"Copie des dernieres quittances de loyer ou charges"},
  ];

  var allPieces = piecesCommunes.concat(piecesSpecifiques);
  var checkState = {};

  allPieces.forEach(function(p, i){
    var row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)";

    var chk = document.createElement("div");
    chk.className = "criteria-check" + (checkState[i]?" checked":"");
    chk.innerHTML = checkState[i]?"&#10003;":"";
    chk.onclick = (function(idx, el){return function(){
      checkState[idx] = !checkState[idx];
      el.classList.toggle("checked", checkState[idx]);
      el.innerHTML = checkState[idx]?"&#10003;":"";
    };})(i, chk);

    var lbl = document.createElement("div");
    lbl.style.cssText = "font-size:12px;flex:1;line-height:1.5;padding-top:2px";
    lbl.textContent = p.label;

    row.appendChild(chk);
    row.appendChild(lbl);
    checkCard.appendChild(row);
  });
  el.appendChild(checkCard);

  // Generateur de courrier accompagnement
  var courrierCard = document.createElement("div");
  courrierCard.className = "card";
  courrierCard.innerHTML = "<div class='card-title'>&#9993; Courrier d accompagnement</div>"+
    "<div class='field'><label>Nom du patient</label><input type='text' id='pj-patient' value='"+name+"' placeholder='M./Mme [NOM Prenom]'></div>"+
    "<div class='field'><label>Lien avec le demandeur</label><input type='text' id='pj-lien' placeholder='Ex: coordinateur de parcours, assistante sociale...'></div>"+
    "<div class='field'><label>Situation justifiant la demande</label><textarea id='pj-situation' placeholder='Decrivez en 3-5 phrases la situation et pourquoi une mesure est necessaire...' rows='4'></textarea></div>";

  var btnCourrier = document.createElement("button");
  btnCourrier.className = "btn-primary";
  btnCourrier.textContent = "Generer le courrier d accompagnement";
  btnCourrier.onclick = genCourrierPJ;
  courrierCard.appendChild(btnCourrier);

  var btnIA = document.createElement("button");
  btnIA.className = "btn-purple";
  btnIA.textContent = "Enrichir avec l IA";
  btnIA.onclick = enrichirIA;
  courrierCard.appendChild(btnIA);

  var resultDiv = document.createElement("div");
  resultDiv.id = "pjResult";
  courrierCard.appendChild(resultDiv);
  el.appendChild(courrierCard);

  // Actes conservatoires (en attendant la mesure)
  var actesCard = document.createElement("div");
  actesCard.className = "card";
  actesCard.innerHTML = "<div class='card-title'>&#128268; En attendant la mesure</div>"+
    "<div style='font-size:12px;color:var(--text-2);line-height:1.7'>"+
    "Avant que la mesure soit prononcee, le coordinateur peut :<br>"+
    "&#9642; Demander une <strong>sauvegarde de justice</strong> en urgence (24-48h)<br>"+
    "&#9642; Alerter le <strong>procureur de la Republique</strong> si danger immediat<br>"+
    "&#9642; Contacter la <strong>MDPH</strong> pour une mise sous protection provisoire<br>"+
    "&#9642; Signaler la situation a la <strong>mairie / CCAS</strong><br>"+
    "&#9642; Informer le <strong>medecin traitant</strong> pour qu il etablisse le certificat medical"+
    "</div>"+
    "<button class='btn-amber' onclick='copierSignalement()'>Copier un signalement au procureur</button>";
  el.appendChild(actesCard);
}

function genCourrierPJ(){
  var patient = document.getElementById("pj-patient")&&document.getElementById("pj-patient").value||"[PATIENT]";
  var lien = document.getElementById("pj-lien")&&document.getElementById("pj-lien").value||"coordinateur de parcours";
  var situation = document.getElementById("pj-situation")&&document.getElementById("pj-situation").value||"A preciser";
  var mesure = selectedMesure ? MESURES.find(function(m){return m.id===selectedMesure;}) : null;

  var lines = [
    "Objet : Demande de "+(mesure?mesure.nom:"mesure de protection juridique")+" — "+patient,
    "",
    "Madame, Monsieur,",
    "",
    "Je me permets de vous adresser ce courrier en ma qualite de "+lien+", dans le cadre du suivi du parcours de sante de "+patient+".",
    "",
    "SITUATION",
    situation,
    "",
    "ELEMENTS JUSTIFIANT LA DEMANDE",
    "Les criteres observes suggerent qu une mesure de protection juridique est necessaire pour preserver les interets de cette personne.",
    mesure?"La mesure de "+mesure.nom+" semble la plus appropriee compte tenu de la situation.":"Une evaluation par le juge des tutelles permettra de determiner la mesure la plus adaptee.",
    "",
    "DOCUMENTS JOINTS",
    "- Certificat medical (en cours)",
    "- Formulaire CERFA 15891 (ci-joint)",
    "- Copie des pieces d identite",
    "",
    "Je reste disponible pour tout complement d information.",
    "",
    "Cordialement,",
    lien,
    "ParcourSante AI — Coordination de parcours"
  ];
  var texte = lines.join("\n");

  var res = document.getElementById("pjResult");
  if(!res) return;
  res.innerHTML = "<div class='result-box'>"+texte+"</div>";
  var btn = document.createElement("button");
  btn.className = "btn-secondary";
  btn.style.marginTop = "8px";
  btn.textContent = "Copier";
  btn.onclick = function(){navigator.clipboard.writeText(texte).then(function(){showToast("Courrier copie");});};
  res.appendChild(btn);
}

async function enrichirIA(){
  var patient = document.getElementById("pj-patient")&&document.getElementById("pj-patient").value||"";
  var situation = document.getElementById("pj-situation")&&document.getElementById("pj-situation").value||"";
  var mesure = selectedMesure ? MESURES.find(function(m){return m.id===selectedMesure;}) : null;
  var apiKey = getApiKey();
  var res = document.getElementById("pjResult");
  if(!res) return;
  if(!apiKey.startsWith("sk-")){res.innerHTML="<div class='result-box'>Cle API requise</div>";return;}
  res.innerHTML = "<div class='result-box ai-loading'>Generation en cours...</div>";
  var prompt = "Tu es coordinateur de parcours. Redige un courrier professionnel pour demander une "+
    (mesure?mesure.nom:"mesure de protection juridique")+
    " pour le patient "+patient+". Situation : "+situation+
    ". Format : lettre officielle au juge des tutelles du TJ Bobigny. Sois factuel, professionnel, concis (max 250 mots).";
  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    var data = await resp.json();
    var text = data.content&&data.content[0]&&data.content[0].text||"";
    res.innerHTML = "<div class='result-box'>"+text+"</div>";
    var btn = document.createElement("button");
    btn.className = "btn-secondary";btn.style.marginTop="8px";btn.textContent="Copier";
    btn.onclick=function(){navigator.clipboard.writeText(text).then(function(){showToast("Copie");});};
    res.appendChild(btn);
  }catch(e){res.innerHTML="<div class='result-box'>Erreur API</div>";}
}

    "173 av. Paul Vaillant-Couturier, 93000 Bobigny",
    "",
    "Objet : Signalement — situation de danger pour majeur vulnerable",
    "",
    "Monsieur le Procureur,",
    "",
    "J ai l honneur de vous signaler la situation de [NOM PATIENT], ne(e) le [DDN], residant [ADRESSE].",
    "",
    "Cette personne se trouve dans une situation de danger immediat en raison de [PRECISER LA SITUATION].",
    "",

    "",

// ── SUIVI ──
function renderSuivi(){
  var el = document.getElementById("mainContent");
  el.innerHTML = "";

  var addCard = document.createElement("div");
  addCard.className = "card";
  addCard.innerHTML = "<div class='card-title'>+ Ajouter une echeance</div>"+
    "<div class='field'><label>Type</label><select id='s-type' style='width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px;outline:none;font-family:var(--font-body)'>"+
    "<option>Depot de la requete</option><option>Audience juge tutelles</option><option>Bilan annuel</option><option>Renouvellement mesure</option><option>Inventaire patrimonial</option><option>Autre</option>"+
    "</select></div>"+
    "<div class='field'><label>Date</label><input type='date' id='s-date' style='width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px;outline:none;font-family:var(--font-body)'></div>"+
    "<div class='field'><label>Note</label><input type='text' id='s-note' placeholder='Precision...' style='width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:9px;outline:none;font-family:var(--font-body)'></div>"+
    "<button class='btn-primary' style='padding:10px' onclick='ajouterSuivi()'>Ajouter</button>";
  el.appendChild(addCard);

  if(!pjSuivis.length){
    el.innerHTML += "<div style='text-align:center;padding:30px;color:var(--text-3)'><div style='font-size:32px;margin-bottom:8px'>&#128197;</div><div>Aucune echeance enregistree</div></div>";
    return;
  }

  var now = new Date().toISOString().split("T")[0];
  pjSuivis.sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(s, i){
    var isPast = s.date < now;
    var isSoon = !isPast && s.date <= new Date(Date.now()+30*86400000).toISOString().split("T")[0];
    var item = document.createElement("div");
    item.className = "suivi-item";
    item.style.borderColor = isPast?"var(--red-border)":isSoon?"var(--amber-border)":"var(--border)";
    item.innerHTML = "<div class='suivi-date'>"+new Date(s.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"2-digit"})+"</div>"+
      "<div style='flex:1'>"+
      "<div style='font-size:13px;font-weight:600'>"+s.type+"</div>"+
      (s.note?"<div style='font-size:11px;color:var(--text-2)'>"+s.note+"</div>":"")+
      "</div>"+
      "<span class='pill "+(isPast?"red":isSoon?"amber":"green")+"'>"+(isPast?"Passe":isSoon?"Bientot":"OK")+"</span>";
    var delBtn = document.createElement("div");
    delBtn.style.cssText = "cursor:pointer;color:var(--text-3);font-size:14px;padding:4px";
    delBtn.textContent = "×";
    delBtn.onclick = (function(idx){return function(){pjSuivis.splice(idx,1);localStorage.setItem("ps_pj_suivis",JSON.stringify(pjSuivis));renderSuivi();};})(i);
    item.appendChild(delBtn);
    el.appendChild(item);
  });
}

function ajouterSuivi(){
  var type = document.getElementById("s-type")&&document.getElementById("s-type").value||"";
  var date = document.getElementById("s-date")&&document.getElementById("s-date").value||"";
  var note = document.getElementById("s-note")&&document.getElementById("s-note").value||"";
  if(!date){showToast("Date obligatoire");return;}
  pjSuivis.push({type:type,date:date,note:note,id:Date.now()});
  localStorage.setItem("ps_pj_suivis",JSON.stringify(pjSuivis));
  showToast("Echeance ajoutee");
  renderSuivi();
}

function toggleTheme(){
  var current = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme",current==="dark"?"light":"dark");
  localStorage.setItem("ps_theme",current==="dark"?"light":"dark");
}

function showToast(msg){
  var t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2400);
}
</script>
