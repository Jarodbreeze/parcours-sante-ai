<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.topbar{position:sticky;top:0;z-index:100;background:var(--topbar-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 14px;gap:10px}
.back-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);font-size:12px;cursor:pointer;font-family:var(--font-body)}
.tb-title{font-size:14px;font-weight:600;flex:1;text-align:center;letter-spacing:-.2px}

/* TABS */
.main-tabs{display:flex;background:var(--bg-2);border-bottom:1px solid var(--border);padding:0 14px;position:sticky;top:54px;z-index:50}
.main-tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.main-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* SEARCH */
.search-bar{padding:12px 14px;background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:103px;z-index:40}
.search-input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 14px 10px 38px;outline:none;font-family:var(--font-body)}
.search-input:focus{border-color:var(--blue-border);background:var(--bg-2)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-3);pointer-events:none}

/* CONTENT */
.content{padding:12px 14px 80px}

/* DEP SECTION */
.dep-section{margin-bottom:16px}
.dep-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:6px}
.dep-code{width:36px;height:36px;border-radius:8px;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0}
.dep-name{font-size:14px;font-weight:600;flex:1}
.dep-count{font-size:11px;color:var(--text-3)}
.dep-arrow{font-size:12px;color:var(--text-3);transition:transform .2s}
.dep-arrow.open{transform:rotate(90deg)}

/* DAC CARD */
.dac-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;transition:all .15s}
.dac-card:hover{border-color:var(--border-2)}
.dac-card.mine{border-color:var(--blue-border);background:var(--blue-bg)}
.dac-name{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dac-mine-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--blue);color:#fff}
.dac-info{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.dac-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2)}
.dac-communes{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.commune-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg-3);color:var(--text-3);border:1px solid var(--border)}
.dac-actions{display:flex;gap:6px;margin-top:10px}
.dac-btn{flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-2);font-family:var(--font-body);transition:all .15s;text-align:center}
.dac-btn:hover{background:var(--bg-3)}
.dac-btn.blue{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.dac-btn.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}

/* METRO CARD */
.metro-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.metro-ville{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.metro-dep{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);font-weight:700}

/* CERFA */
.cerfa-section{margin-bottom:16px}
.cerfa-cat{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;padding:0 2px}
.cerfa-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;transition:all .15s}
.cerfa-card:hover{border-color:var(--border-2)}
.cerfa-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.cerfa-num{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--bg-3);color:var(--text-2);border:1px solid var(--border);white-space:nowrap;margin-top:1px;flex-shrink:0}
.cerfa-name{font-size:13px;font-weight:600;line-height:1.3;flex:1}
.cerfa-desc{font-size:11px;color:var(--text-2);line-height:1.5;margin-bottom:8px}
.cerfa-actions{display:flex;gap:6px}
.cerfa-btn{flex:1;padding:7px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-2);font-family:var(--font-body);transition:all .15s;text-align:center}
.cerfa-btn.dl{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.cerfa-btn.ai{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}

/* AI PANEL */
.ai-panel{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:10px;padding:14px;margin-top:8px;display:none}
.ai-panel.open{display:block}
.ai-loading{font-size:12px;color:var(--text-2);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-result{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap}

/* IA RECHERCHE NATIONALE */
.ia-search-box{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.ia-search-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ia-search-input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;outline:none;font-family:var(--font-body);margin-bottom:8px}
.ia-result-zone{background:var(--bg-3);border-radius:8px;padding:12px;font-size:12px;color:var(--text-2);line-height:1.7;display:none}
.ia-result-zone.open{display:block}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-3)}
.empty-icon{font-size:36px;margin-bottom:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--border-2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
</style>
</head>

// ── NAVIGATION ──
function switchTab(tab){
  currentTab = tab;
  ["idf","metro","national","cerfa"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("active", t===tab);
  });
  var sb = document.getElementById("searchBar");
  sb.style.display = tab==="cerfa" ? "none" : "block";
  render();
}

function doSearch(){
  render();
}

// ── RENDER ──
function render(){
  var query = (document.getElementById("searchInput")||{value:""}).value.toLowerCase().trim();
  if(currentTab==="idf") renderIDF(query);
  else if(currentTab==="metro") renderMetro(query);
  else if(currentTab==="national") renderNational();
  else if(currentTab==="cerfa") renderCERFA();
}

function renderIDF(query){
  var el = document.getElementById("mainContent");
  el.innerHTML = "";
  var total = 0;

  DAC_IDF.forEach(function(dep){
    var filtered = dep.dacs.filter(function(d){
      if(!query) return true;
      return d.nom.toLowerCase().includes(query) ||
        dep.nom.toLowerCase().includes(query) ||
        dep.code.includes(query) ||
        d.communes.some(function(c){return c.toLowerCase().includes(query);});
    });
    if(!filtered.length) return;
    total += filtered.length;

    var section = document.createElement("div");
    section.className = "dep-section";

    var header = document.createElement("div");
    header.className = "dep-header";
    var isOpen = openDeps[dep.code] !== false;
    header.innerHTML = '<div class="dep-code">'+dep.code+'</div>'+
      '<div class="dep-name">'+dep.nom+'</div>'+
      '<div class="dep-count">'+filtered.length+' DAC</div>'+
      '<div class="dep-arrow '+(isOpen?"open":"")+'">›</div>';
    var arrow = header.querySelector(".dep-arrow");
    header.onclick = (function(code, arr){return function(){
      openDeps[code] = !openDeps[code];
      arr.classList.toggle("open", !!openDeps[code]);
      var body = document.getElementById("body-"+code);
      if(body) body.style.display = openDeps[code] ? "block" : "none";
    };})(dep.code, arrow);
    section.appendChild(header);

    var body = document.createElement("div");
    body.id = "body-"+dep.code;
    body.style.display = isOpen ? "block" : "none";

    filtered.forEach(function(d){
      var card = document.createElement("div");
      card.className = "dac-card" + (d.mine ? " mine" : "");

      var nameDiv = document.createElement("div");
      nameDiv.className = "dac-name";
      nameDiv.textContent = d.nom;
      if(d.mine){
        var badge = document.createElement("span");
        badge.className = "dac-mine-badge";
        badge.textContent = "MON TERRITOIRE";
        nameDiv.appendChild(badge);
      }
      card.appendChild(nameDiv);

      var info = document.createElement("div");
      info.className = "dac-info";
      info.innerHTML = '<div class="dac-info-row"><span>📞</span><span>'+d.tel+'</span></div>';
      if(d.site) info.innerHTML += '<div class="dac-info-row"><span>🌐</span><a href="'+d.site+'" target="_blank" style="color:var(--blue);font-size:11px">'+d.site.replace("https://","")+'</a></div>';
      card.appendChild(info);

      var communes = document.createElement("div");
      communes.className = "dac-communes";
      d.communes.forEach(function(c){
        var tag = document.createElement("span");
        tag.className = "commune-tag";
        tag.textContent = c;
        communes.appendChild(tag);
      });
      card.appendChild(communes);

      var actions = document.createElement("div");
      actions.className = "dac-actions";

      var btnCall = document.createElement("div");
      btnCall.className = "dac-btn blue";
      btnCall.textContent = "📞 Appeler";
      btnCall.onclick = (function(tel){return function(){appelerDAC(tel);};})(d.tel);
      actions.appendChild(btnCall);

      var btnCopy = document.createElement("div");
      btnCopy.className = "dac-btn";
      btnCopy.textContent = "Copier";
      btnCopy.onclick = (function(txt){return function(){copierInfo(txt);};})(d.nom+" — "+d.tel);
      actions.appendChild(btnCopy);

      if(d.site){
        var btnSite = document.createElement("div");
        btnSite.className = "dac-btn green";
        btnSite.textContent = "🌐 Site";
        btnSite.onclick = (function(url){return function(){ouvrirSite(url);};})(d.site);
        actions.appendChild(btnSite);
      }
      card.appendChild(actions);
      body.appendChild(card);
    });

    section.appendChild(body);
    el.appendChild(section);
  });

  if(total === 0){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>Aucun DAC trouve</div></div>';
  }
}

// ── ACTIONS ──
function appelerDAC(tel){
  window.location.href = "tel:"+tel.replace(/\s/g,"");
}

function ouvrirSite(url){
  window.open(url, "_blank");
}

function copierInfo(text){
  navigator.clipboard.writeText(text).then(function(){showToast("Copie");});
}

async function rechercherDAC(){
  var query = document.getElementById("iaQuery").value.trim();
  if(!query) return;
  var apiKey = localStorage.getItem("mediasante_api_key")||"";
  var result = document.getElementById("iaResult");
  result.className = "ia-result-zone open";
  result.innerHTML = "<div class='ai-loading'>Recherche en cours...</div>";
  if(!apiKey.startsWith("sk-")){
    result.innerHTML = "<div style='font-size:12px;color:var(--text-2)'>Cle API requise. Consultez dac-en-france.fr pour l annuaire complet.</div>";
    return;
  }
  var prompt = "Tu es expert des dispositifs d appui a la coordination (DAC) en France. Reponds a cette question : "+query+". Donne le nom du DAC competent, les contacts si tu les connais, et les ressources locales. Si tu n es pas sur d un numero, oriente vers dac-en-france.fr. Sois concis.";
  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    var data = await resp.json();
    var text = data.content&&data.content[0]&&data.content[0].text||"";
    result.innerHTML = "<div class='ai-result'>"+text+"</div>";
  }catch(e){
    result.innerHTML = "<div style='font-size:12px;color:var(--red)'>Erreur de connexion</div>";
  }
}

async function aideIACERFA(nom, num, panelId){
  var panel = document.getElementById(panelId);
  if(!panel) return;
  var isOpen = panel.classList.contains("open");
  panel.classList.toggle("open", !isOpen);
  if(isOpen) return;
  var apiKey = localStorage.getItem("mediasante_api_key")||"";
  panel.innerHTML = "<div class='ai-loading'>Generation en cours...</div>";
  if(!apiKey.startsWith("sk-")){
    panel.innerHTML = "<div style='font-size:12px;color:var(--text-2)'>Cle API requise pour l aide IA.</div>";
    return;
  }
  var prompt = "Tu es coordinateur DAC expert en dossiers administratifs. Pour le formulaire "+num+" ("+nom+"), explique en 4 points : 1. A qui s adresse ce formulaire 2. Les 3 erreurs les plus frequentes 3. Les pieces justificatives indispensables 4. Le delai de traitement habituel. Sois concis et pratique.";
  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:350,messages:[{role:"user",content:prompt}]})});
    var data = await resp.json();
    var text = data.content&&data.content[0]&&data.content[0].text||"";
    panel.innerHTML = "<div class='ai-result'>"+text+"</div>";
  }catch(e){
    panel.innerHTML = "<div style='font-size:12px;color:var(--red)'>Erreur API</div>";
  }
}

async function conseilCERFA(){
  var query = document.getElementById("cerfaQuery").value.trim();
  if(!query) return;
  var apiKey = localStorage.getItem("mediasante_api_key")||"";
  var result = document.getElementById("cerfaResult");
  result.className = "ia-result-zone open";
  result.innerHTML = "<div class='ai-loading'>Analyse en cours...</div>";
  if(!apiKey.startsWith("sk-")){
    result.innerHTML = "<div style='font-size:12px;color:var(--text-2)'>Cle API requise. Consultez la liste des CERFA ci-dessous.</div>";
    return;
  }
  var cerfaList = CERFA_DATA.map(function(s){return s.items.map(function(c){return c.num+" - "+c.nom;}).join(", ");}).join(", ");
  var prompt = "Tu es coordinateur DAC expert en droits sociaux. Selon cette situation : "+query+". Recommande les CERFA pertinents parmi : "+cerfaList+". Liste les CERFA prioritaires avec une explication courte pour chacun.";
  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:300,messages:[{role:"user",content:prompt}]})});
    var data = await resp.json();
    var text = data.content&&data.content[0]&&data.content[0].text||"";
    result.innerHTML = "<div class='ai-result'>"+text+"</div>";
  }catch(e){
    result.innerHTML = "<div style='font-size:12px;color:var(--red)'>Erreur API</div>";
  }
}


function toggleTheme(){
  var current = document.documentElement.getAttribute("data-theme");
  var next = current==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("ps_theme",next);
}

function showToast(msg){
  var t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
}
